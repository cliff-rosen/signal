name: web
type: Load Balanced Web Service

http:
  path: '/'
  healthcheck:
    path: '/health'
    interval: 30s
    timeout: 5s
    healthy_threshold: 2
    unhealthy_threshold: 3
  stickiness: true

image:
  build: Dockerfile
  port: 4888

cpu: 256
memory: 512
platform: linux/amd64
count: 1

variables:
  PORT: 4888
  DB_HOST: chatter.c0guz2wkpcod.us-east-2.rds.amazonaws.com
  DB_USER: admin
  DB_NAME: signal

secrets:
  DB_PASSWORD: /copilot/botbeam/prod/secrets/db_password
  ADMIN_PASSWORD: /copilot/botbeam/prod/secrets/admin_password

network:
  vpc:
    placement: public
